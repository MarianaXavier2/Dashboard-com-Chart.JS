<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <h1>Grafico com ChatJS</h1>
    <div id="graficos">
        <div class="grafico1">
            <h3>Temperetura e umidade no periodo da tarde</h3>
            <canvas id="myChart"></canvas>
        </div>
        <div class="grafico2">
            <h3>Media da temperatura e umidade no periodo da tarde</h3>
            <canvas id="myChart2"></canvas>
        </div>
    </div>

    <script>
        const horas = [
            "12:00",
            "13:00",
            "14:00",
            "15:00",
            "16:00",
            "17:00",
        ];
        const meses = [
            "",
            "13:00",
            "14:00",
            "15:00",
            "16:00",
            "17:00",
        ];

        const data = {
            labels: horas,
            datasets: [{
                label: 'Temperatura',
                backgroundColor: '#6171FF',
                borderColor: '#6171FF',
                data: [30, 29, 28, 25, 22, 23],
            },
            {
                label: 'Umidade',
                backgroundColor: '#C788FC',
                borderColor: '#C788FC',
                data: [80, 82, 80, 85, 80, 83],
            }]
        };

        const data2 = {
            labels: meses,
            datasets: [{
                label: 'Temperatura Média',
                backgroundColor: '#6171FF',
                borderColor: '#6171FF',
                data: [22, 24, 27, 23, 20, 18],
            },
            {
                label: 'Umidade Média',
                backgroundColor: '#C788FC',
                borderColor: '#C788FC',
                data: [90, 89, 93, 87, 88, 82],
            }]
        };

        const config = {
            type: 'line',
            data: data,
            options: {}
        };

        const config2 = {
            type: 'bar',
            data: data2,
            options: {}
        };
    </script>

    <script>
        const myChart = new Chart(
            document.getElementById('myChart'),
            config
        );

        const myChart2 = new Chart(
            document.getElementById('myChart2'),
            config2
        );
    </script>

</body>

</html>
